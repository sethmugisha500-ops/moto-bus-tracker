version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: motobus
      POSTGRES_PASSWORD: motobus123
      POSTGRES_DB: motobus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - motobus_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - motobus_network

  backend:
    build: ./backend-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://motobus:motobus123@postgres:5432/motobus_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      JWT_REFRESH_SECRET: your_refresh_secret_key_here
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    networks:
      - motobus_network

  frontend:
    build: ./frontend-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - motobus_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - motobus_network

volumes:
  postgres_data:
  redis_data:

networks:
  motobus_network:
    driver: bridge