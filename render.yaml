services:
  - type: web
    name: moto-bus-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend-api
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MTN_MOMO_API_KEY
        sync: false
      - key: MTN_MOMO_API_SECRET
        sync: false
      - key: MTN_MOMO_SUBSCRIPTION_KEY
        sync: false
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: motobus-db
    plan: free
    region: frankfurt